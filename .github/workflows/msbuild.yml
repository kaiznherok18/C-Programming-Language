name: C Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'false'

    - name: Install GCC and Make
      run: sudo apt-get update && sudo apt-get install -y build-essential

    - name: Find and Build C Programs
      run: |
        # Build all C files in practices directory
        cd practices 2>/dev/null || true
        for file in *.c; do
          if [ -f "$file" ]; then
            echo "Building $file..."
            gcc -o "${file%.c}" "$file" || echo "Warning: Failed to build $file"
          fi
        done
        cd ../codecedomy 2>/dev/null || true
        for file in *.c; do
          if [ -f "$file" ]; then
            echo "Building $file..."
            gcc -o "${file%.c}" "$file" || echo "Warning: Failed to build $file"
          fi
        done
